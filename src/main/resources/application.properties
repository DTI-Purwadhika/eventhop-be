spring.application.name=eventhop
server.port=${SERVER_PORT}

spring.config.import=file:./.env[.properties]

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

rsa.private-key=certs/private.pem
rsa.public-key=certs/public.pem

spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT}
spring.redis.password=${REDIS_PASSWORD}
spring.redis.ssl=true
#spring.redis.timeout=2000ms

#storage
#cloud.aws.credentials.accessKey=<your-access-key>
#cloud.aws.credentials.secretKey=<your-secret-key>
#cloud.aws.region.static=<your-region>  # e.g., us-east-1

spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.org.hibernate=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.data.redis=DEBUG

spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true